server:
  port: 8083

spring:
  application:
    name: smartval-submission
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:fundgate}
    username: ${DB_USER:fundgate}
    password: ${DB_PASS:fundgate_pass}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASS:guest}

services:
  fundgate:
    url: ${FUNDGATE_SERVICE_URL:http://localhost:8081}

fundgate:
  internal-api-key: ${INTERNAL_API_KEY:fundgate-internal-secret}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    uz.fundgate: INFO
