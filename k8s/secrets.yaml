  namespace: fundgate
  labels:
    app.kubernetes.io/part-of: fundgate-smartval
type: Opaque
data:
  # base64 encoded values - REPLACE with real secrets before deploying
  # echo -n 'value' | base64
  DB_USER: ZnVuZGdhdGU=                    # fundgate
  DB_PASS: ZnVuZGdhdGVfcGFzcw==            # fundgate_pass
  REDIS_PASSWORD: ""                         # empty for now
