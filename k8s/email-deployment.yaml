apiVersion: v1
kind: Service
metadata:
  name: email
  namespace: fundgate
  labels:
    app: email
    app.kubernetes.io/part-of: fundgate-smartval
spec:
  type: ClusterIP
  ports:
    - port: 8084
      targetPort: 8084
      name: http
  selector:
    app: email
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: email
  namespace: fundgate
  labels:
    app: email
    app.kubernetes.io/part-of: fundgate-smartval
spec:
  replicas: 2
  selector:
    matchLabels:
      app: email
  template:
    metadata:
      labels:
        app: email
    spec:
      containers:
        - name: email
          image: fundgate/smartval-email:latest
          ports:
            - containerPort: 8084
          env:
            - name: RABBITMQ_HOST
              valueFrom:
                configMapKeyRef:
                  name: fundgate-config
                  key: RABBITMQ_HOST
            - name: RABBITMQ_PORT
              valueFrom:
                configMapKeyRef:
                  name: fundgate-config
                  key: RABBITMQ_PORT
            - name: SMTP_HOST
              valueFrom:
                configMapKeyRef:
                  name: fundgate-config
                  key: SMTP_HOST
            - name: SMTP_USERNAME
              valueFrom:
                secretKeyRef:
                  name: fundgate-secrets
                  key: SMTP_USERNAME
            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: fundgate-secrets
                  key: SMTP_PASSWORD
            - name: INTERNAL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: fundgate-secrets
                  key: INTERNAL_API_KEY
            - name: SPRING_PROFILES_ACTIVE
              valueFrom:
                configMapKeyRef:
                  name: fundgate-config
                  key: SPRING_PROFILES_ACTIVE
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8084
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8084
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
