apiVersion: v1
kind: Service
metadata:
  name: fundgate
  namespace: fundgate
  labels:
    app: fundgate
    app.kubernetes.io/part-of: fundgate-smartval
spec:
  type: ClusterIP
  ports:
    - port: 8081
      targetPort: 8081
      name: http
  selector:
    app: fundgate
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fundgate
  namespace: fundgate
  labels:
    app: fundgate
    app.kubernetes.io/part-of: fundgate-smartval
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fundgate
  template:
    metadata:
      labels:
        app: fundgate
    spec:
      containers:
        - name: fundgate
          image: fundgate/smartval-fundgate:latest
          ports:
            - containerPort: 8081
          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: fundgate-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: fundgate-config
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: fundgate-config
                  key: DB_NAME
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: fundgate-secrets
                  key: DB_USER
            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  name: fundgate-secrets
                  key: DB_PASS
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: fundgate-config
                  key: REDIS_HOST
            - name: AWS_REGION
              valueFrom:
                configMapKeyRef:
                  name: fundgate-config
                  key: AWS_REGION
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: fundgate-secrets
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: fundgate-secrets
                  key: AWS_SECRET_ACCESS_KEY
            - name: INTERNAL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: fundgate-secrets
                  key: INTERNAL_API_KEY
            - name: SPRING_PROFILES_ACTIVE
              valueFrom:
                configMapKeyRef:
                  name: fundgate-config
                  key: SPRING_PROFILES_ACTIVE
          resources:
            requests:
              cpu: 250m
              memory: 384Mi
            limits:
              cpu: "1"
              memory: 768Mi
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: fundgate-hpa
  namespace: fundgate
  labels:
    app: fundgate
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: fundgate
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
