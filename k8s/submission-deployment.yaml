apiVersion: v1
kind: Service
metadata:
  name: submission
  namespace: fundgate
  labels:
    app: submission
    app.kubernetes.io/part-of: fundgate-smartval
spec:
  type: ClusterIP
  ports:
    - port: 8083
      targetPort: 8083
      name: http
  selector:
    app: submission
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: submission
  namespace: fundgate
  labels:
    app: submission
    app.kubernetes.io/part-of: fundgate-smartval
spec:
  replicas: 2
  selector:
    matchLabels:
      app: submission
  template:
    metadata:
      labels:
        app: submission
    spec:
      containers:
        - name: submission
          image: fundgate/smartval-submission:latest
          ports:
            - containerPort: 8083
          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: fundgate-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: fundgate-config
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: fundgate-config
                  key: DB_NAME
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: fundgate-secrets
                  key: DB_USER
            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  name: fundgate-secrets
                  key: DB_PASS
            - name: RABBITMQ_HOST
              valueFrom:
                configMapKeyRef:
                  name: fundgate-config
                  key: RABBITMQ_HOST
            - name: RABBITMQ_PORT
              valueFrom:
                configMapKeyRef:
                  name: fundgate-config
                  key: RABBITMQ_PORT
            - name: FUNDGATE_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: fundgate-config
                  key: FUNDGATE_SERVICE_URL
            - name: INTERNAL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: fundgate-secrets
                  key: INTERNAL_API_KEY
            - name: SPRING_PROFILES_ACTIVE
              valueFrom:
                configMapKeyRef:
                  name: fundgate-config
                  key: SPRING_PROFILES_ACTIVE
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8083
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
