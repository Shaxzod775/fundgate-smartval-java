<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${subject}">FundGate</title>
</head>
<body style="margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; background-color: #f3f4f6;">

<table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background-color: #f3f4f6;">
    <tr>
        <td align="center" style="padding: 40px 20px;">
            <table role="presentation" width="600" cellspacing="0" cellpadding="0" style="max-width: 600px; background-color: #ffffff; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.07);">

                <!-- Header -->
                <tr>
                    <td style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 32px 40px; text-align: center;">
                        <h1 style="margin: 0; color: #ffffff; font-size: 24px; font-weight: 700; letter-spacing: -0.3px;">FundGate</h1>
                    </td>
                </tr>

                <!-- Subject -->
                <tr>
                    <td style="padding: 32px 40px 0 40px;">
                        <h2 th:text="${subject}" style="margin: 0 0 20px 0; color: #111827; font-size: 20px; font-weight: 600;">Email Subject</h2>
                    </td>
                </tr>

                <!-- Body -->
                <tr>
                    <td style="padding: 0 40px 32px 40px;">
                        <p th:text="${body}" style="margin: 0; color: #4b5563; font-size: 15px; line-height: 1.7;">
                            Email body content goes here...
                        </p>
                    </td>
                </tr>

                <!-- Divider -->
                <tr>
                    <td style="padding: 0 40px;">
                        <hr style="border: none; border-top: 1px solid #e5e7eb; margin: 0;"/>
                    </td>
                </tr>

                <!-- Footer -->
                <tr>
                    <td style="padding: 24px 40px; text-align: center;">
                        <p style="margin: 0 0 4px 0; color: #6b7280; font-size: 13px;">Best regards, FundGate Team</p>
                        <p style="margin: 0; color: #9ca3af; font-size: 12px;">
                            &copy; <span th:text="${year}">2026</span> FundGate. All rights reserved.
                        </p>
                    </td>
                </tr>

            </table>
        </td>
    </tr>
</table>

</body>
</html>
