server:
  port: 8084

spring:
  application:
    name: smartval-email
  mail:
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASS:guest}
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
  # Disable JPA auto-config (this service doesn't use a database)
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration

fundgate:
  email:
    from: ${EMAIL_FROM:noreply@fundgate.uz}
    reply-to: ${EMAIL_REPLY_TO:support@fundgate.uz}
  internal-api-key: ${INTERNAL_API_KEY:fundgate-internal-secret}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    uz.fundgate: INFO
